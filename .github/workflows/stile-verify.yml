name: stile-verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verify required repository files exist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          required_paths = [
              "README.md",
              "LICENSE",
              "reference/stile_delivery_admission_v2_1.py",
              "reference/STILE_Delivery_Admission_Browser_Demo_v2_1.html",
              "docs/FAQ.md",
              "docs/Proof-Sketch.md",
              "docs/Quickstart.md",
              "docs/STILE-Architecture-Notes.md",
              "docs/STILE-Message-Delivery.png",
              "docs/Dependency-Elimination-Framework.png",
              "docs/Shunyaya-Structural-Stack.png",
              "VERIFY/VERIFY.md",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
          ]

          missing = [p for p in required_paths if not Path(p).is_file()]

          if missing:
              print("ERROR: Missing required repository files:")
              for path in missing:
                  print(" -", path)
              sys.exit(1)

          print("Required repository files verified.")
          PY

      - name: Verify removed legacy paths are absent
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          removed_paths = [
              "demo",
              "demo_otp",
              "docs/STILE_v1.2.pdf",
              "docs/STILE-Message-Mermaid-Diagram.png",
          ]

          present = [p for p in removed_paths if Path(p).exists()]

          if present:
              print("ERROR: Removed legacy paths are still present:")
              for path in present:
                  print(" -", path)
              sys.exit(1)

          print("Legacy path absence verified.")
          PY

      - name: Verify frozen SHA256 hashes
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import re
          import sys
          from pathlib import Path

          freeze_path = Path("VERIFY/FREEZE_DEMO_SHA256.txt")

          targets = [
              Path("reference/STILE_Delivery_Admission_Browser_Demo_v2_1.html"),
              Path("reference/stile_delivery_admission_v2_1.py"),
          ]

          text = freeze_path.read_text(encoding="utf-8")

          entries = {}
          pending_path = None

          for raw_line in text.splitlines():
              line = raw_line.strip()

              if not line:
                  continue

              hash_match = re.fullmatch(
                  r"SHA256:\s*([0-9a-fA-F]{64})",
                  line,
              )

              if hash_match and pending_path is not None:
                  normalized_path = pending_path.replace("\\", "/")
                  entries[normalized_path] = hash_match.group(1).lower()
                  pending_path = None
                  continue

              if line.startswith("reference/") or line.startswith("reference\\"):
                  pending_path = line

          def sha256_file(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          for path in targets:
              label = path.as_posix()

              if label not in entries:
                  print(f"ERROR: No frozen SHA256 entry found for {label}")
                  sys.exit(1)

              expected = entries[label]
              actual = sha256_file(path)

              if actual != expected:
                  print(f"ERROR: Hash mismatch for {label}")
                  print("Expected:", expected)
                  print("Actual:  ", actual)
                  sys.exit(1)

              print(f"Hash verified for {label}: {actual}")

          print("Frozen SHA256 verification completed.")
          PY

      - name: Run STILE Python reference
        shell: bash
        run: |
          python reference/stile_delivery_admission_v2_1.py

      - name: Verify STILE Python reference output
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [
              sys.executable,
              "reference/stile_delivery_admission_v2_1.py",
          ]

          result = subprocess.run(
              cmd,
              capture_output=True,
              text=True,
              check=True,
          )

          output = result.stdout

          required_markers = [
              "RESOLVED",
              "ADMITTED",
              "INCOMPLETE",
              "ABSTAIN",
              "CONFLICT",
              "Conformance: 25/25 PASS",
          ]

          missing = [
              marker
              for marker in required_markers
              if marker not in output
          ]

          if missing:
              print("ERROR: Python reference output is missing expected markers:")
              for marker in missing:
                  print(" -", marker)

              print("\nFull output:\n")
              print(output)
              sys.exit(1)

          print("STILE Python reference output verified.")
          PY

      - name: Run STILE Python conformance self-test
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          cmd = [
              sys.executable,
              "reference/stile_delivery_admission_v2_1.py",
              "--self-test",
          ]

          result = subprocess.run(
              cmd,
              capture_output=True,
              text=True,
              check=True,
          )

          try:
              report = json.loads(result.stdout)
          except json.JSONDecodeError:
              print("ERROR: Self-test did not return valid JSON.")
              print(result.stdout)
              sys.exit(1)

          expected = {
              "status": "PASS",
              "passed": 25,
              "total": 25,
          }

          for key, value in expected.items():
              if report.get(key) != value:
                  print(
                      f"ERROR: Self-test field {key!r} "
                      f"expected {value!r}, got {report.get(key)!r}"
                  )
                  sys.exit(1)

          print("STILE Python conformance verified: 25/25 PASS.")
          PY

      - name: Verify deterministic Python output
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [
              sys.executable,
              "reference/stile_delivery_admission_v2_1.py",
          ]

          first = subprocess.run(
              cmd,
              capture_output=True,
              text=True,
              check=True,
          )

          second = subprocess.run(
              cmd,
              capture_output=True,
              text=True,
              check=True,
          )

          if first.stdout != second.stdout:
              print("ERROR: Python reference output changed between identical runs.")
              sys.exit(1)

          print("Deterministic Python output verified.")
          PY

      - name: Verify active repository references
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          files_to_check = [
              Path("README.md"),
              Path("docs/Quickstart.md"),
          ]

          required_references = [
              "reference/stile_delivery_admission_v2_1.py",
              "reference/STILE_Delivery_Admission_Browser_Demo_v2_1.html",
              "VERIFY/VERIFY.md",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
          ]

          failed = False

          for path in files_to_check:
              text = path.read_text(encoding="utf-8")

              missing = [
                  reference
                  for reference in required_references
                  if reference not in text
              ]

              if missing:
                  failed = True
                  print(f"ERROR: {path} is missing active references:")
                  for reference in missing:
                      print(" -", reference)

          if failed:
              sys.exit(1)

          print("Active repository references verified.")
          PY
