name: stile-verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify required repository files exist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          required_paths = [
              "README.md",
              "LICENSE",
              "demo/stile_message_delivery.py",
              "demo/stile_message_delivery.html",
              "demo_otp/otp_without_sending.py",
              "docs/Quickstart.md",
              "docs/FAQ.md",
              "docs/Proof-Sketch.md",
              "docs/STILE-Architecture-Notes.md",
              "docs/STILE_v1.2.pdf",
              "docs/STILE-Message-Delivery.png",
              "docs/STILE-Message-Mermaid-Diagram.png",
              "docs/Dependency-Elimination-Framework.png",
              "docs/Shunyaya-Structural-Stack.png",
              "VERIFY/VERIFY.txt",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
          ]

          missing = [p for p in required_paths if not Path(p).exists()]
          if missing:
              print("ERROR: Missing required repository files:")
              for p in missing:
                  print(" -", p)
              sys.exit(1)

          print("Required repository files verified.")
          PY

      - name: Verify frozen SHA256 hashes if present
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import re
          import sys
          from pathlib import Path

          freeze_path = Path("VERIFY/FREEZE_DEMO_SHA256.txt")

          targets = {
              "demo/stile_message_delivery.py": Path("demo/stile_message_delivery.py"),
              "demo/stile_message_delivery.html": Path("demo/stile_message_delivery.html"),
              "demo_otp/otp_without_sending.py": Path("demo_otp/otp_without_sending.py"),
          }

          freeze_text = freeze_path.read_text(encoding="utf-8")

          def sha256_file(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          checked = 0

          for label, path in targets.items():
              label_variants = [
                  re.escape(label),
                  re.escape(label.replace("/", "\\")),
              ]

              pattern = rf"({'|'.join(label_variants)})\s*SHA256:\s*([0-9a-f]{{64}})"
              match = re.search(pattern, freeze_text, re.IGNORECASE)

              if not match:
                  print(f"WARNING: No frozen SHA256 entry found for {label}; skipping hash check.")
                  continue

              expected = match.group(2).lower()
              actual = sha256_file(path).lower()

              if actual != expected:
                  print(f"ERROR: Hash mismatch for {label}")
                  print("Expected:", expected)
                  print("Actual:  ", actual)
                  sys.exit(1)

              print(f"Hash verified for {label}: {actual}")
              checked += 1

          if checked == 0:
              print("WARNING: No hash entries matched. File existence and runtime checks will still run.")

          print("Frozen SHA256 verification completed.")
          PY

      - name: Run STILE Python demo
        shell: bash
        run: |
          python demo/stile_message_delivery.py

      - name: Verify STILE Python demo output markers
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [sys.executable, "demo/stile_message_delivery.py"]
          result = subprocess.run(cmd, capture_output=True, text=True, check=True)
          out = result.stdout

          required_markers = [
              "message_delivered",
              "structure_aligned",
              "STRUCTURALLY_DELIVERED",
              "sigma",
          ]

          missing = [marker for marker in required_markers if marker not in out]
          if missing:
              print("ERROR: STILE Python demo output missing expected markers:")
              for marker in missing:
                  print(" -", marker)
              print("\nFull output:\n")
              print(out)
              sys.exit(1)

          print("STILE Python demo output markers verified.")
          PY

      - name: Run STILE Python demo twice and verify determinism
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [sys.executable, "demo/stile_message_delivery.py"]

          result1 = subprocess.run(cmd, capture_output=True, text=True, check=True)
          result2 = subprocess.run(cmd, capture_output=True, text=True, check=True)

          if result1.stdout != result2.stdout:
              print("ERROR: Non-deterministic STILE Python demo output")
              sys.exit(1)

          print("Deterministic STILE Python output verified.")
          PY

      - name: Run OTP optional demo
        shell: bash
        run: |
          python demo_otp/otp_without_sending.py

      - name: Verify OTP optional demo output markers
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [sys.executable, "demo_otp/otp_without_sending.py"]
          result = subprocess.run(cmd, capture_output=True, text=True, check=True)
          out = result.stdout

          required_markers = [
              "OTP Without Sending",
              "Valid OTP structure",
              "Wrong OTP structure",
              "Expired OTP window",
              "Explicit conflict",
              "Missing user_id",
              "resolution:    RESOLVED",
              "resolution:    CONFLICT",
              "resolution:    ABSTAIN",
              "same structure -> same sigma: True",
              "No SMS. No email. No callback. No network dependency.",
          ]

          missing = [marker for marker in required_markers if marker not in out]
          if missing:
              print("ERROR: OTP demo output missing expected markers:")
              for marker in missing:
                  print(" -", marker)
              print("\nFull output:\n")
              print(out)
              sys.exit(1)

          print("OTP optional demo output markers verified.")
          PY

      - name: Verify HTML demo contains expected structural hooks
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          html_path = Path("demo/stile_message_delivery.html")
          text = html_path.read_text(encoding="utf-8")

          required_snippets = [
              "STILE MessageDelivery Demo",
              "Delivery Without Communication",
              "correctness = structure",
              "message_delivered iff structure_aligned",
              "same structure -> same certificate",
              "Truth vs transport",
              "Structure Layer",
              "Transport Layer",
          ]

          missing = [snippet for snippet in required_snippets if snippet not in text]
          if missing:
              print("ERROR: HTML demo is missing expected structural hooks:")
              for snippet in missing:
                  print(" -", snippet)
              sys.exit(1)

          print("HTML demo structural hooks verified.")
          PY

      - name: Verify README contains core STILE claims
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          text = Path("README.md").read_text(encoding="utf-8")

          required_snippets = [
              "Structural Integration Leverage",
              "Correctness Without Communication",
              "correctness = resolve(structure)",
              "message_delivered iff structure_aligned",
              "delivery = resolve(structure)",
              "same structure -> same delivery -> same certificate",
              "demo/stile_message_delivery.py",
              "demo_otp/otp_without_sending.py",
          ]

          missing = [snippet for snippet in required_snippets if snippet not in text]
          if missing:
              print("ERROR: README.md is missing expected STILE claims:")
              for snippet in missing:
                  print(" -", snippet)
              sys.exit(1)

          print("README core claims verified.")
          PY
